---
- name: Provision local machine
  hosts: localhost
  gather_facts: true
  pre_tasks:
    - name: private vars | check custom vars file
      ansible.builtin.stat:
        path: "{{ dotfiles_private_vars_file }}"
      register: dotfiles_private_vars
      tags: [always]

    - name: private vars | load optional custom vars
      ansible.builtin.include_vars:
        file: "{{ dotfiles_private_vars_file }}"
      when: dotfiles_private_vars.stat.exists
      tags: [always]

  roles:
    - role: bootstrap
      tags: [bootstrap]
    - role: shell
      tags: [shell]
    - role: dotfiles
      tags: [dotfiles]
    - role: cli_tools
      tags: [cli_tools]
    - role: terminal
      tags: [terminal]
    - role: go
      tags: [go]
    - role: node
      tags: [node]
    - role: python
      tags: [python]
    - role: vim
      tags: [vim]
    - role: emacs
      tags: [emacs]
    - role: vscode
      tags: [vscode]
    - role: ruby
      tags: [ruby]
    - role: java
      tags: [java]
    - role: clojure
      tags: [clojure]
    - role: elixir
      tags: [elixir]
    - role: kubernetes
      tags: [kubernetes]
    - role: opencode
      tags: [opencode]
    - role: gemini_cli
      tags: [gemini_cli]
    - role: copilot_cli
      tags: [copilot_cli]
    - role: claude
      tags: [claude]
    - role: macos
      tags: [macos]
