---
- name: shell | darwin | install formulae
  community.general.homebrew:
    name: "{{ item }}"
    state: present
  loop: "{{ shell_homebrew_formulae }}"
  when: shell_homebrew_formulae | length > 0

- name: shell | darwin | read current login shell
  ansible.builtin.command:
    cmd: "dscl . -read /Users/{{ item }} UserShell"
  register: shell_login_shell_reads
  changed_when: false
  check_mode: false
  loop: "{{ shell_login_shell_targets }}"

- name: shell | darwin | change login shell when needed
  ansible.builtin.debug:
    msg: >-
      Check mode: would run chsh -s {{ shell_default_executable }} {{ item.item }}
      because the current login shell is
      {{ item.stdout | regex_replace('^UserShell:\\s*', '') | default('unknown') }}.
  when:
    - ansible_check_mode
    - (item.stdout | regex_replace('^UserShell:\\s*', '') | default('')) != shell_default_executable
  loop: "{{ shell_login_shell_reads.results }}"

- name: shell | darwin | change login shell when needed
  ansible.builtin.command:
    cmd: "chsh -s {{ shell_default_executable }} {{ item.item }}"
  when: >-
    not ansible_check_mode and
    (item.stdout | regex_replace('^UserShell:\\s*', '') | default('')) != shell_default_executable
  loop: "{{ shell_login_shell_reads.results }}"
