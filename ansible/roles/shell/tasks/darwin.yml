---
- name: shell | darwin | resolve Homebrew binary
  ansible.builtin.set_fact:
    shell_homebrew_bin: >-
      {{
        bootstrap_homebrew_bin | default(
          (bootstrap_homebrew_bin_arm64 | default('/opt/homebrew/bin/brew'))
          if ansible_facts['architecture'] == 'arm64'
          else (bootstrap_homebrew_bin_x86_64 | default('/usr/local/bin/brew'))
        )
      }}
  changed_when: false

- name: shell | darwin | verify Homebrew binary
  ansible.builtin.stat:
    path: "{{ shell_homebrew_bin }}"
  register: shell_homebrew

- name: shell | darwin | assert Homebrew is available
  ansible.builtin.assert:
    that:
      - shell_homebrew.stat.exists
    fail_msg: >-
      Homebrew must be available at {{ shell_homebrew_bin }} before the shell role runs.
      Run bootstrap first or enable install_homebrew_if_missing there.
    success_msg: "Homebrew detected at {{ shell_homebrew_bin }} for shell role installs."

- name: shell | darwin | install formulae
  community.general.homebrew:
    name: "{{ item }}"
    state: present
  loop: "{{ shell_homebrew_formulae }}"
  when: shell_homebrew_formulae | length > 0

- name: shell | darwin | read current login shell
  ansible.builtin.command:
    cmd: "dscl . -read /Users/{{ item }} UserShell"
  register: shell_login_shell_reads
  changed_when: false
  check_mode: false
  loop: "{{ shell_login_shell_targets }}"

- name: shell | darwin | change login shell when needed
  ansible.builtin.command:
    cmd: "chsh -s {{ shell_default_executable }} {{ item.item }}"
  when: >-
    (item.stdout | regex_search('UserShell: (.+)', '\\1') | first | default('')) != shell_default_executable
  loop: "{{ shell_login_shell_reads.results }}"
