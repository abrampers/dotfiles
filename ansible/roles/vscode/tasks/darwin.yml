---
- name: vscode | darwin | resolve Homebrew binary
  ansible.builtin.set_fact:
    vscode_homebrew_bin: >-
      {{
        bootstrap_homebrew_bin | default(
          (bootstrap_homebrew_bin_arm64 | default('/opt/homebrew/bin/brew'))
          if ansible_facts['architecture'] == 'arm64'
          else (bootstrap_homebrew_bin_x86_64 | default('/usr/local/bin/brew'))
        )
      }}
  changed_when: false

- name: vscode | darwin | verify Homebrew binary
  ansible.builtin.stat:
    path: "{{ vscode_homebrew_bin }}"
  register: vscode_homebrew

- name: vscode | darwin | assert Homebrew is available
  ansible.builtin.assert:
    that:
      - vscode_homebrew.stat.exists
    fail_msg: >-
      Homebrew must be available at {{ vscode_homebrew_bin }} before the vscode role runs.
      Run bootstrap first or enable install_homebrew_if_missing there.
    success_msg: "Homebrew detected at {{ vscode_homebrew_bin }} for VS Code installs."

- name: vscode | darwin | install Visual Studio Code
  community.general.homebrew_cask:
    name: visual-studio-code
    state: present
