---
- name: clojure | darwin entrypoint
  ansible.builtin.import_tasks: darwin.yml
  when: ansible_facts['os_family'] == 'Darwin'

- name: clojure | unsupported platform placeholder
  ansible.builtin.debug:
    msg: "Clojure role currently supports Darwin only."
  when: ansible_facts['os_family'] != 'Darwin'
