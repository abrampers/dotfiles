---
- name: clojure | darwin | resolve Homebrew binary
  ansible.builtin.set_fact:
    clojure_homebrew_bin: >-
      {{
        bootstrap_homebrew_bin | default(
          (bootstrap_homebrew_bin_arm64 | default('/opt/homebrew/bin/brew'))
          if ansible_facts['architecture'] == 'arm64'
          else (bootstrap_homebrew_bin_x86_64 | default('/usr/local/bin/brew'))
        )
      }}
  changed_when: false

- name: clojure | darwin | verify Homebrew binary
  ansible.builtin.stat:
    path: "{{ clojure_homebrew_bin }}"
  register: clojure_homebrew

- name: clojure | darwin | assert Homebrew is available
  ansible.builtin.assert:
    that:
      - clojure_homebrew.stat.exists
    fail_msg: >-
      Homebrew must be available at {{ clojure_homebrew_bin }} before the clojure role runs.
      Run bootstrap first or enable install_homebrew_if_missing there.
    success_msg: "Homebrew detected at {{ clojure_homebrew_bin }} for Clojure installs."

- name: clojure | darwin | configure clojure-lsp tap
  community.general.homebrew_tap:
    name: clojure-lsp/brew
    state: present

- name: clojure | darwin | install leiningen
  community.general.homebrew:
    name: leiningen
    state: present

- name: clojure | darwin | install clojure-lsp-native
  community.general.homebrew:
    name: clojure-lsp-native
    state: present
