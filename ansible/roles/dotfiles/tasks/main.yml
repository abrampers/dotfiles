---
- name: dotfiles | resolve Homebrew binary
  ansible.builtin.set_fact:
    dotfiles_homebrew_bin: >-
      {{
        bootstrap_homebrew_bin | default(
          (bootstrap_homebrew_bin_arm64 | default('/opt/homebrew/bin/brew'))
          if ansible_facts['architecture'] == 'arm64'
          else (bootstrap_homebrew_bin_x86_64 | default('/usr/local/bin/brew'))
        )
      }}
  changed_when: false

- name: dotfiles | verify Homebrew binary
  ansible.builtin.stat:
    path: "{{ dotfiles_homebrew_bin }}"
  register: dotfiles_homebrew

- name: dotfiles | assert Homebrew is available
  ansible.builtin.assert:
    that:
      - dotfiles_homebrew.stat.exists
    fail_msg: >-
      Homebrew must be available at {{ dotfiles_homebrew_bin }} before the dotfiles role runs.
      Run bootstrap first or enable install_homebrew_if_missing there.
    success_msg: "Homebrew detected at {{ dotfiles_homebrew_bin }} for dotfiles prerequisites."

- name: dotfiles | preview rcm install
  ansible.builtin.debug:
    msg: "Check mode: would install rcm with Homebrew before rcup checks."
  when: ansible_check_mode

- name: dotfiles | install rcm
  community.general.homebrew:
    name: rcm
    state: present
  when: not ansible_check_mode

- name: dotfiles | verify rcup is available
  ansible.builtin.command:
    cmd: which rcup
  register: dotfiles_rcup_check
  changed_when: false
  check_mode: false

- name: dotfiles | assert rcup is available
  ansible.builtin.assert:
    that:
      - dotfiles_rcup_check.rc == 0
    fail_msg: >-
      rcup must be installed by the dotfiles role before deployment can continue.
    success_msg: "rcup detected for dotfiles deployment."

- name: dotfiles | read rcrc install state
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.rcrc"
  register: dotfiles_rcrc_state
  changed_when: false

- name: dotfiles | read rcup deployment state
  ansible.builtin.command:
    cmd: lsrc -F
  register: dotfiles_lsrc_state
  changed_when: false
  check_mode: false

- name: dotfiles | determine rcup deployment need
  ansible.builtin.set_fact:
    dotfiles_rcup_needs_deploy: >-
      {{
        dotfiles_lsrc_state.stdout_lines
        | reject('equalto', '')
        | reject('search', ':[@$X]$')
        | list
        | length > 0
      }}
  changed_when: false

- name: dotfiles | preview rcrc bootstrap
  ansible.builtin.debug:
    msg: "Check mode: would run rcup rcrc before full dotfiles deployment."
  when:
    - ansible_check_mode
    - dotfiles_rcrc_bootstrap_args | length > 0
    - not dotfiles_rcrc_state.stat.exists

- name: dotfiles | bootstrap rcrc
  ansible.builtin.command:
    argv:
      - rcup
      - rcrc
  when:
    - not ansible_check_mode
    - dotfiles_rcrc_bootstrap_args | length > 0
    - not dotfiles_rcrc_state.stat.exists

- name: dotfiles | preview full dotfiles deployment
  ansible.builtin.debug:
    msg: >-
      Check mode: would {{ 'run ' + ((['rcup'] + dotfiles_rcup_flags) | join(' ')) if dotfiles_rcup_needs_deploy else 'skip rcup because all managed files are already linked or copied.' }}
  when: ansible_check_mode

- name: dotfiles | deploy dotfiles when needed
  ansible.builtin.command:
    argv: "{{ ['rcup'] + dotfiles_rcup_flags }}"
  when:
    - not ansible_check_mode
    - dotfiles_rcup_needs_deploy
