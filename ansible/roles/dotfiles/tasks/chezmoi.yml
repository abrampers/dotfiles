- name: dotfiles | describe chezmoi preview artifacts
  ansible.builtin.debug:
    msg: >-
      Durable preview artifacts are written to
      {{ dotfiles_chezmoi_managed_file }} and
      {{ dotfiles_chezmoi_preview_report_file }}.
  when:
    - dotfiles_chezmoi_enabled
    - dotfiles_chezmoi_preview_only
    - not dotfiles_chezmoi_apply_enabled

- name: dotfiles | run chezmoi dry-run apply
  ansible.builtin.command:
    cmd: chezmoi -S "{{ dotfiles_chezmoi_source_dir }}" apply --dry-run --verbose
  changed_when: false
  when:
    - dotfiles_chezmoi_enabled
    - not ansible_check_mode
    - dotfiles_chezmoi_preview_only
    - not dotfiles_chezmoi_apply_enabled
