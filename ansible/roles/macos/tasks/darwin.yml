---
- name: macos | darwin | resolve Homebrew binary
  ansible.builtin.set_fact:
    macos_homebrew_bin: >-
      {{
        bootstrap_homebrew_bin | default(
          (bootstrap_homebrew_bin_arm64 | default('/opt/homebrew/bin/brew'))
          if ansible_facts['architecture'] == 'arm64'
          else (bootstrap_homebrew_bin_x86_64 | default('/usr/local/bin/brew'))
        )
      }}
  changed_when: false

- name: macos | darwin | verify Homebrew binary
  ansible.builtin.stat:
    path: "{{ macos_homebrew_bin }}"
  register: macos_homebrew

- name: macos | darwin | assert Homebrew is available
  ansible.builtin.assert:
    that:
      - macos_homebrew.stat.exists
    fail_msg: >-
      Homebrew must be available at {{ macos_homebrew_bin }} before the macos role runs.
      Run bootstrap first or enable install_homebrew_if_missing there.
    success_msg: "Homebrew detected at {{ macos_homebrew_bin }} for macOS desktop installs."

- name: macos | darwin | configure taps
  community.general.homebrew_tap:
    name: "{{ item }}"
    state: present
  loop: "{{ macos_homebrew_taps }}"
  loop_control:
    label: "{{ item }}"
  when: macos_homebrew_taps | length > 0

- name: macos | darwin | install formulae
  community.general.homebrew:
    name: "{{ item }}"
    state: present
  loop: "{{ macos_homebrew_formulae }}"
  loop_control:
    label: "{{ item }}"
  when: macos_homebrew_formulae | length > 0

- name: macos | darwin | install casks
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
  loop: "{{ macos_homebrew_casks }}"
  loop_control:
    label: "{{ item }}"
  when: macos_homebrew_casks | length > 0
