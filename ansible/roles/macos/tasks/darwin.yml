---
- name: macos | darwin | resolve Homebrew binary
  ansible.builtin.set_fact:
    macos_homebrew_bin: >-
      {{
        bootstrap_homebrew_bin | default(
          (bootstrap_homebrew_bin_arm64 | default('/opt/homebrew/bin/brew'))
          if ansible_facts['architecture'] == 'arm64'
          else (bootstrap_homebrew_bin_x86_64 | default('/usr/local/bin/brew'))
        )
      }}
  changed_when: false

- name: macos | darwin | verify Homebrew binary
  ansible.builtin.stat:
    path: "{{ macos_homebrew_bin }}"
  register: macos_homebrew

- name: macos | darwin | assert Homebrew is available
  ansible.builtin.assert:
    that:
      - macos_homebrew.stat.exists
    fail_msg: >-
      Homebrew must be available at {{ macos_homebrew_bin }} before the macos role runs.
      Run bootstrap first or enable install_homebrew_if_missing there.
    success_msg: "Homebrew detected at {{ macos_homebrew_bin }} for macOS desktop installs."

- name: macos | darwin | configure koekeishiya tap
  community.general.homebrew_tap:
    name: koekeishiya/formulae
    state: present

- name: macos | darwin | install yabai
  community.general.homebrew:
    name: yabai
    state: present

- name: macos | darwin | install skhd
  community.general.homebrew:
    name: skhd
    state: present

- name: macos | darwin | install karabiner-elements
  community.general.homebrew_cask:
    name: karabiner-elements
    state: present

- name: macos | darwin | install stats
  community.general.homebrew_cask:
    name: stats
    state: present

- name: macos | darwin | install Source Code Pro for Powerline
  community.general.homebrew_cask:
    name: font-source-code-pro-for-powerline
    state: present

- name: macos | darwin | install SauceCodePro Nerd Font
  community.general.homebrew_cask:
    name: font-sauce-code-pro-nerd-font
    state: present

- name: macos | darwin | check binary assertions
  ansible.builtin.stat:
    path: "{{ item.path }}"
  register: macos_binary_stats
  changed_when: false
  loop: "{{ macos_binary_assertions }}"
  loop_control:
    label: "{{ item.name }}"

- name: macos | darwin | check app assertions
  ansible.builtin.stat:
    path: "{{ item.path }}"
  register: macos_app_stats
  changed_when: false
  loop: "{{ macos_app_assertions }}"
  loop_control:
    label: "{{ item.name }}"

- name: macos | darwin | assert binary installs
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: "Expected {{ item.item.name }} at {{ item.item.path }} after macos role install."
    success_msg: "Verified {{ item.item.name }} at {{ item.item.path }}."
  loop: "{{ macos_binary_stats.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: not ansible_check_mode

- name: macos | darwin | assert app installs
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: "Expected {{ item.item.name }} at {{ item.item.path }} after macos role install."
    success_msg: "Verified {{ item.item.name }} at {{ item.item.path }}."
  loop: "{{ macos_app_stats.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: not ansible_check_mode
