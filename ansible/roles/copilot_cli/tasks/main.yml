---
- name: copilot_cli | darwin entrypoint
  ansible.builtin.import_tasks: darwin.yml
  when: ansible_facts['os_family'] == 'Darwin'

- name: copilot_cli | unsupported platform placeholder
  ansible.builtin.debug:
    msg: "Copilot CLI role currently supports Darwin only."
  when: ansible_facts['os_family'] != 'Darwin'
