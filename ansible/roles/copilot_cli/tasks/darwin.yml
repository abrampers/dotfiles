---
- name: copilot_cli | darwin | resolve Homebrew binary
  ansible.builtin.set_fact:
    copilot_cli_homebrew_bin: >-
      {{
        bootstrap_homebrew_bin | default(
          (bootstrap_homebrew_bin_arm64 | default('/opt/homebrew/bin/brew'))
          if ansible_facts['architecture'] == 'arm64'
          else (bootstrap_homebrew_bin_x86_64 | default('/usr/local/bin/brew'))
        )
      }}
  changed_when: false

- name: copilot_cli | darwin | verify Homebrew binary
  ansible.builtin.stat:
    path: "{{ copilot_cli_homebrew_bin }}"
  register: copilot_cli_homebrew

- name: copilot_cli | darwin | assert Homebrew is available
  ansible.builtin.assert:
    that:
      - copilot_cli_homebrew.stat.exists
    fail_msg: >-
      Homebrew must be available at {{ copilot_cli_homebrew_bin }} before the copilot_cli role runs.
      Run bootstrap first or enable install_homebrew_if_missing there.
    success_msg: "Homebrew detected at {{ copilot_cli_homebrew_bin }} for Copilot CLI installs."

- name: copilot_cli | darwin | install copilot-cli
  community.general.homebrew:
    name: copilot-cli
    state: present
