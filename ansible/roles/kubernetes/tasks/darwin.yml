---
- name: kubernetes | darwin | resolve Homebrew binary
  ansible.builtin.set_fact:
    kubernetes_homebrew_bin: >-
      {{
        bootstrap_homebrew_bin | default(
          (bootstrap_homebrew_bin_arm64 | default('/opt/homebrew/bin/brew'))
          if ansible_facts['architecture'] == 'arm64'
          else (bootstrap_homebrew_bin_x86_64 | default('/usr/local/bin/brew'))
        )
      }}
  changed_when: false

- name: kubernetes | darwin | verify Homebrew binary
  ansible.builtin.stat:
    path: "{{ kubernetes_homebrew_bin }}"
  register: kubernetes_homebrew

- name: kubernetes | darwin | assert Homebrew is available
  ansible.builtin.assert:
    that:
      - kubernetes_homebrew.stat.exists
    fail_msg: >-
      Homebrew must be available at {{ kubernetes_homebrew_bin }} before the kubernetes role runs.
      Run bootstrap first or enable install_homebrew_if_missing there.
    success_msg: "Homebrew detected at {{ kubernetes_homebrew_bin }} for Kubernetes installs."

- name: kubernetes | darwin | configure k9s tap
  community.general.homebrew_tap:
    name: derailed/k9s
    state: present

- name: kubernetes | darwin | install kubernetes-cli
  community.general.homebrew:
    name: kubernetes-cli
    state: present

- name: kubernetes | darwin | install k9s
  community.general.homebrew:
    name: k9s
    state: present

- name: kubernetes | darwin | install kubectx
  community.general.homebrew:
    name: kubectx
    state: present
