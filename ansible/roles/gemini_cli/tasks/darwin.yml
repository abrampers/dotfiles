---
- name: gemini_cli | darwin | resolve Homebrew binary
  ansible.builtin.set_fact:
    gemini_cli_homebrew_bin: >-
      {{
        bootstrap_homebrew_bin | default(
          (bootstrap_homebrew_bin_arm64 | default('/opt/homebrew/bin/brew'))
          if ansible_facts['architecture'] == 'arm64'
          else (bootstrap_homebrew_bin_x86_64 | default('/usr/local/bin/brew'))
        )
      }}
  changed_when: false

- name: gemini_cli | darwin | verify Homebrew binary
  ansible.builtin.stat:
    path: "{{ gemini_cli_homebrew_bin }}"
  register: gemini_cli_homebrew

- name: gemini_cli | darwin | assert Homebrew is available
  ansible.builtin.assert:
    that:
      - gemini_cli_homebrew.stat.exists
    fail_msg: >-
      Homebrew must be available at {{ gemini_cli_homebrew_bin }} before the gemini_cli role runs.
      Run bootstrap first or enable install_homebrew_if_missing there.
    success_msg: "Homebrew detected at {{ gemini_cli_homebrew_bin }} for Gemini CLI installs."

- name: gemini_cli | darwin | install gemini-cli
  community.general.homebrew:
    name: gemini-cli
    state: present
