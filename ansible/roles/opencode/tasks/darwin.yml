---
- name: opencode | darwin | resolve Homebrew binary
  ansible.builtin.set_fact:
    opencode_homebrew_bin: >-
      {{
        bootstrap_homebrew_bin | default(
          (bootstrap_homebrew_bin_arm64 | default('/opt/homebrew/bin/brew'))
          if ansible_facts['architecture'] == 'arm64'
          else (bootstrap_homebrew_bin_x86_64 | default('/usr/local/bin/brew'))
        )
      }}
  changed_when: false

- name: opencode | darwin | verify Homebrew binary
  ansible.builtin.stat:
    path: "{{ opencode_homebrew_bin }}"
  register: opencode_homebrew

- name: opencode | darwin | assert Homebrew is available
  ansible.builtin.assert:
    that:
      - opencode_homebrew.stat.exists
    fail_msg: >-
      Homebrew must be available at {{ opencode_homebrew_bin }} before the opencode role runs.
      Run bootstrap first or enable install_homebrew_if_missing there.
    success_msg: "Homebrew detected at {{ opencode_homebrew_bin }} for OpenCode installs."

- name: opencode | darwin | configure anomalyco tap
  community.general.homebrew_tap:
    name: anomalyco/tap
    state: present

- name: opencode | darwin | install opencode
  community.general.homebrew:
    name: opencode
    state: present
