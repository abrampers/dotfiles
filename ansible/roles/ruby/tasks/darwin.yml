---
- name: ruby | darwin | resolve Homebrew binary
  ansible.builtin.set_fact:
    ruby_homebrew_bin: >-
      {{
        bootstrap_homebrew_bin | default(
          (bootstrap_homebrew_bin_arm64 | default('/opt/homebrew/bin/brew'))
          if ansible_facts['architecture'] == 'arm64'
          else (bootstrap_homebrew_bin_x86_64 | default('/usr/local/bin/brew'))
        )
      }}
  changed_when: false

- name: ruby | darwin | verify Homebrew binary
  ansible.builtin.stat:
    path: "{{ ruby_homebrew_bin }}"
  register: ruby_homebrew

- name: ruby | darwin | assert Homebrew is available
  ansible.builtin.assert:
    that:
      - ruby_homebrew.stat.exists
    fail_msg: >-
      Homebrew must be available at {{ ruby_homebrew_bin }} before the ruby role runs.
      Run bootstrap first or enable install_homebrew_if_missing there.
    success_msg: "Homebrew detected at {{ ruby_homebrew_bin }} for Ruby installs."

- name: ruby | darwin | install rbenv
  community.general.homebrew:
    name: rbenv
    state: present
