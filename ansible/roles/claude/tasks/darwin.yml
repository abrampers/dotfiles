---
- name: claude | darwin | check installed binary
  ansible.builtin.command:
    cmd: /bin/sh -c "command -v {{ claude_binary_name }}"
  register: claude_binary
  changed_when: false
  failed_when: false

- name: claude | darwin | preview installer
  ansible.builtin.debug:
    msg: "Check mode: would run curl -fsSL {{ claude_installer_url }} | bash"
  when:
    - ansible_check_mode
    - claude_binary.rc != 0

- name: claude | darwin | install Claude CLI
  ansible.builtin.shell: |
    curl -fsSL "{{ claude_installer_url }}" | bash
  args:
    executable: /bin/bash
  when:
    - not ansible_check_mode
    - claude_binary.rc != 0
