---
- name: python | darwin | resolve Homebrew binary
  ansible.builtin.set_fact:
    python_homebrew_bin: >-
      {{
        bootstrap_homebrew_bin | default(
          (bootstrap_homebrew_bin_arm64 | default('/opt/homebrew/bin/brew'))
          if ansible_facts['architecture'] == 'arm64'
          else (bootstrap_homebrew_bin_x86_64 | default('/usr/local/bin/brew'))
        )
      }}
  changed_when: false

- name: python | darwin | verify Homebrew binary
  ansible.builtin.stat:
    path: "{{ python_homebrew_bin }}"
  register: python_homebrew

- name: python | darwin | assert Homebrew is available
  ansible.builtin.assert:
    that:
      - python_homebrew.stat.exists
    fail_msg: >-
      Homebrew must be available at {{ python_homebrew_bin }} before the python role runs.
      Run bootstrap first or enable install_homebrew_if_missing there.
    success_msg: "Homebrew detected at {{ python_homebrew_bin }} for Python installs."

- name: python | darwin | install pyenv
  community.general.homebrew:
    name: pyenv
    state: present

- name: python | darwin | install pyenv-virtualenv
  community.general.homebrew:
    name: pyenv-virtualenv
    state: present

- name: python | darwin arm64 entrypoint
  ansible.builtin.import_tasks: darwin_arm64.yml
  when: ansible_facts['architecture'] == 'arm64'

- name: python | darwin x86_64 entrypoint
  ansible.builtin.import_tasks: darwin_x86_64.yml
  when: ansible_facts['architecture'] == 'x86_64'

- name: python | darwin unsupported architecture placeholder
  ansible.builtin.debug:
    msg: "Python role currently has Darwin path handling for arm64 and x86_64 only."
  changed_when: false
  when: ansible_facts['architecture'] not in ['arm64', 'x86_64']

- name: python | darwin | check python version install
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.pyenv/versions/{{ python_version }}"
  register: python_version_dir
  changed_when: false

- name: python | darwin | preview pyenv install
  ansible.builtin.debug:
    msg: "Check mode: would run {{ python_pyenv_bin }} install {{ python_version }}"
  when:
    - ansible_check_mode
    - not python_version_dir.stat.exists

- name: python | darwin | install python version
  ansible.builtin.command:
    cmd: "{{ python_pyenv_bin }} install {{ python_version }}"
  when:
    - not ansible_check_mode
    - not python_version_dir.stat.exists

- name: python | darwin | read global python version
  ansible.builtin.command:
    cmd: "{{ python_pyenv_bin }} global"
  register: python_global_read
  changed_when: false

- name: python | darwin | preview pyenv global
  ansible.builtin.debug:
    msg: "Check mode: would run {{ python_pyenv_bin }} global {{ python_global_version | string }}"
  when:
    - ansible_check_mode
    - (python_global_read.stdout | trim) != (python_global_version | string)

- name: python | darwin | set global python version
  ansible.builtin.command:
    cmd: "{{ python_pyenv_bin }} global {{ python_global_version | string }}"
  when:
    - not ansible_check_mode
    - (python_global_read.stdout | trim) != (python_global_version | string)

- name: python | darwin | install Neovim Python provider
  ansible.builtin.pip:
    name: "{{ python_neovim_pip_package }}"
    executable: "{{ ansible_env.HOME }}/.pyenv/shims/pip3"
