---
- name: editors | darwin | resolve Homebrew binary
  ansible.builtin.set_fact:
    editors_homebrew_bin: >-
      {{
        bootstrap_homebrew_bin | default(
          (bootstrap_homebrew_bin_arm64 | default('/opt/homebrew/bin/brew'))
          if ansible_facts['architecture'] == 'arm64'
          else (bootstrap_homebrew_bin_x86_64 | default('/usr/local/bin/brew'))
        )
      }}
  changed_when: false

- name: editors | darwin | verify Homebrew binary
  ansible.builtin.stat:
    path: "{{ editors_homebrew_bin }}"
  register: editors_homebrew

- name: editors | darwin | assert Homebrew is available
  ansible.builtin.assert:
    that:
      - editors_homebrew.stat.exists
    fail_msg: >-
      Homebrew must be available at {{ editors_homebrew_bin }} before the editors role runs.
      Run bootstrap first or enable install_homebrew_if_missing there.
    success_msg: "Homebrew detected at {{ editors_homebrew_bin }} for editor installs."

- name: editors | darwin | configure taps
  community.general.homebrew_tap:
    name: "{{ item }}"
    state: present
  loop: "{{ editors_homebrew_taps }}"
  loop_control:
    label: "{{ item }}"
  when: editors_homebrew_taps | length > 0

- name: editors | darwin | install formulae
  community.general.homebrew:
    name: "{{ item }}"
    state: present
  loop: "{{ editors_homebrew_formulae + [editors_emacs_formula] }}"
  loop_control:
    label: "{{ item }}"

- name: editors | darwin | install casks
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
  loop: "{{ editors_homebrew_casks }}"
  loop_control:
    label: "{{ item }}"
  when: editors_homebrew_casks | length > 0

- name: editors | darwin | ensure vim-plug directory exists
  ansible.builtin.file:
    path: "{{ editors_vim_plug_path | dirname }}"
    state: directory
    mode: '0755'

- name: editors | darwin | install vim-plug
  ansible.builtin.get_url:
    url: "{{ editors_vim_plug_url }}"
    dest: "{{ editors_vim_plug_path }}"
    mode: '0644'

- name: editors | darwin | architecture link placeholder
  ansible.builtin.debug:
    msg: "Architecture-specific Emacs app linking is defined in darwin_arm64.yml and darwin_x86_64.yml."
  changed_when: false
