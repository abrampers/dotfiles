---
- name: editors | darwin arm64 | verify Emacs app source
  ansible.builtin.stat:
    path: "{{ editors_emacs_app_source_arm64 }}"
  register: editors_emacs_app_arm64
  changed_when: false

- name: editors | darwin arm64 | assert Emacs app source exists
  ansible.builtin.assert:
    that:
      - editors_emacs_app_arm64.stat.exists
    fail_msg: >-
      Expected Apple Silicon Emacs app at {{ editors_emacs_app_source_arm64 }} after installing
      {{ editors_emacs_formula }}.
    success_msg: "Apple Silicon Emacs app detected at {{ editors_emacs_app_source_arm64 }}."

- name: editors | darwin arm64 | link Emacs app
  ansible.builtin.file:
    src: "{{ editors_emacs_app_source_arm64 }}"
    dest: "{{ editors_emacs_app_destination }}"
    state: link
